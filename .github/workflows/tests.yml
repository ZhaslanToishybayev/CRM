name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.3"
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze

      - name: Run all tests
        run: flutter test

      - name: Generate coverage
        run: flutter test --coverage

      - name: Report full lib coverage
        run: bash scripts/ci/report_full_lib_coverage.sh coverage/lcov.info

      - name: Enforce coverage gate
        run: bash scripts/ci/check_coverage_gate.sh coverage/lcov.info 55 scripts/ci/runtime_coverage_scope.txt

      - name: Run integration smoke
        run: bash scripts/ci/run_integration_smoke.sh

      - name: Build APK
        if: github.ref == 'refs/heads/main'
        run: flutter build apk --release --dart-define=BACKEND_MODE=sql

      - name: Build Web
        if: github.ref == 'refs/heads/main'
        run: flutter build web --release --dart-define=BACKEND_MODE=sql

  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.3"
          channel: stable

      - name: Run security audit
        run: |
          flutter pub deps
          flutter pub audit

      - name: Check for vulnerabilities
        run: flutter analyze
