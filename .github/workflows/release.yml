name: Release Pipeline

on:
  push:
    tags:
      - 'v*'

jobs:
  # Job 1: Release to GitHub
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.3'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build Web
        run: flutter build web --release

      - name: Build Android APK
        run: flutter build apk --release

      - name: Build iOS (macOS only)
        if: runner.os == 'macOS'
        run: flutter build ios --release --no-codesign

      - name: Upload APK to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/web/
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Job 2: Deploy to Firebase App Distribution (Android)
  firebase-deploy:
    name: Deploy to Firebase App Distribution
    runs-on: ubuntu-latest
    needs: github-release
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.3'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build Android APK
        run: flutter build apk --release

      - name: Deploy to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: testers
          file: build/app/outputs/flutter-apk/app-release.apk

  # Job 3: Deploy to TestFlight (iOS)
  testflight-deploy:
    name: Deploy to TestFlight
    runs-on: macos-latest
    needs: github-release
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.3'
          channel: 'stable'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'
          bundler-cache: true
          working-directory: ios

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Install CocoaPods dependencies
        run: cd ios && pod install

      - name: Setup signing certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          BUILD_CERTIFICATE_PASSWORD: ${{ secrets.BUILD_CERTIFICATE_PASSWORD }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          echo $BUILD_CERTIFICATE_BASE64 | base64 --decode --output certificate.p12
          security create-keychain -p temp_password build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p temp_password build.keychain
          security import certificate.p12 -k build.keychain -P $P12_PASSWORD -T /usr/bin/codesign
          security list-keychains -d user
          security default-keychain -s build.keychain
          security unlock-keychain -p temp_password build.keychain

      - name: Setup provisioning profile
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          echo $BUILD_PROVISION_PROFILE_BASE64 | base64 --decode --output Profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp Profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Configure signing
        run: |
          flutter clean
          flutter build ios --release --no-codesign

      - name: Upload to App Store Connect
        uses: apple-actions/upload-testflight-build@v2
        with:
          app-store-connect-username: ${{ secrets.APPSTORE_CONNECT_USERNAME }}
          app-store-connect-password: ${{ secrets.APPSTORE_CONNECT_PASSWORD }}
          app-store-connect-provider-short-name: ${{ secrets.APPSTORE_CONNECT_PROVIDER_SHORT_NAME }}
          issuer-id: ${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}
          app-specific-password: ${{ secrets.APPSTORE_PASSWORD }}
          ipa-path: build/ios/Release-iphoneos/*.ipa

  # Job 4: Deploy Web to Firebase Hosting
  deploy-web-hosting:
    name: Deploy to Firebase Hosting
    runs-on: ubuntu-latest
    needs: github-release
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.3'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build Web
        run: flutter build web --release

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: gamified-tasks-crm
