name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'gamified_app/**'
      - 'docs/release/**'
      - '.github/workflows/gamified_app_ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'gamified_app/**'
      - 'docs/release/**'
      - '.github/workflows/gamified_app_ci.yml'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: gamified_app

jobs:
  hygiene:
    name: Repository Hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run hygiene checks
        run: ./scripts/check_repo_hygiene.sh

  quality:
    name: Analyze, Test, Build
    runs-on: ubuntu-latest
    needs: hygiene
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: ./scripts/analyze_release_scope.sh

      - name: Run tests
        run: ./scripts/test_release_scope.sh

      - name: Build web release
        run: flutter build web --release

      - name: Build Android release APK
        if: github.ref == 'refs/heads/main'
        run: flutter build apk --release

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: warn

  security:
    name: Dependency Security
    runs-on: ubuntu-latest
    needs: hygiene
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Security audit
        run: |
          flutter pub deps
          if flutter pub help | grep -q "audit"; then
            flutter pub audit
          else
            echo "flutter pub audit is unavailable in this toolchain; skipping audit command."
          fi

      - name: Security-focused analyze
        run: ./scripts/analyze_release_scope.sh

  schema_drift:
    name: Schema Drift Check
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    env:
      DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install psql client
        if: env.DATABASE_URL != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Run schema drift script
        run: ./scripts/check_schema_drift.sh
