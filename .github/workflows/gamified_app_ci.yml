name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'gamified_app/**'
      - 'gamified_app/e2e/**'
      - 'docs/release/**'
      - '.github/workflows/gamified_app_ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'gamified_app/**'
      - 'gamified_app/e2e/**'
      - 'docs/release/**'
      - '.github/workflows/gamified_app_ci.yml'
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: gamified_app

jobs:
  hygiene:
    name: Repository Hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run hygiene checks
        run: ./scripts/check_repo_hygiene.sh

  quality:
    name: Analyze, Test, Build
    runs-on: ubuntu-latest
    needs: hygiene
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: ./scripts/analyze_release_scope.sh

      - name: Run tests
        run: ./scripts/test_release_scope.sh

      - name: Build web release
        run: flutter build web --release

      - name: Build Android release APK
        if: github.ref == 'refs/heads/main'
        run: flutter build apk --release

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: warn

  security:
    name: Dependency Security
    runs-on: ubuntu-latest
    needs: hygiene
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Security audit
        run: |
          flutter pub deps
          if flutter pub help | grep -q "audit"; then
            flutter pub audit
          else
            echo "flutter pub audit is unavailable in this toolchain; skipping audit command."
          fi

      - name: Security-focused analyze
        run: ./scripts/analyze_release_scope.sh

  schema_drift:
    name: Schema Drift Check
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    env:
      DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install psql client
        if: env.DATABASE_URL != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Run schema drift script
        run: ./scripts/check_schema_drift.sh

  staging_e2e:
    name: Web E2E Smoke (Diagnostic)
    runs-on: ubuntu-latest
    needs: [quality, security]
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    continue-on-error: true
    defaults:
      run:
        working-directory: gamified_app/e2e
    env:
      STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
      E2E_EMAIL: ${{ secrets.E2E_STAGING_EMAIL }}
      E2E_PASSWORD: ${{ secrets.E2E_STAGING_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check staging URL config
        id: staging_config
        run: |
          if [[ -z "${STAGING_BASE_URL:-}" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "[staging-e2e] STAGING_BASE_URL is not configured. Skipping diagnostic web smoke."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.staging_config.outputs.enabled == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: gamified_app/e2e/package-lock.json

      - name: Install E2E dependencies
        if: steps.staging_config.outputs.enabled == 'true'
        run: npm ci

      - name: Install Playwright browsers
        if: steps.staging_config.outputs.enabled == 'true'
        run: npx playwright install --with-deps chromium

      - name: Run staging smoke suite
        if: steps.staging_config.outputs.enabled == 'true'
        working-directory: gamified_app
        run: ./scripts/run_staging_e2e.sh

      - name: Upload Playwright report
        if: always() && steps.staging_config.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: gamified_app/e2e/playwright-report
          if-no-files-found: warn

      - name: Upload Playwright traces
        if: always() && steps.staging_config.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: gamified_app/e2e/test-results
          if-no-files-found: warn

  full_audit:
    name: Full Test Audit (Extended)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get
        working-directory: gamified_app

      - name: Run extended audit suite
        run: ./scripts/test_full_audit.sh | tee full_audit.log
        working-directory: gamified_app

      - name: Upload extended audit log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-audit-log
          path: gamified_app/full_audit.log
          if-no-files-found: warn
