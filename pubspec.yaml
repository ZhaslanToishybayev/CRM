name: gamified_task_app
description: "Educational Gamified Task Management App - Learn Flutter, Supabase, and AI Tools"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # State Management - Riverpod
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  json_annotation: ^4.9.0

  # Code Generation
  freezed_annotation: ^2.4.4
  freezed: ^2.4.7

  # Environment Configuration
  flutter_dotenv: ^5.1.0

  # Local Storage - Hive
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Networking
  dio: ^5.4.4+1

  # Navigation
  go_router: ^14.2.7

  # UI & Animations
  flutter_animate: ^4.5.0
  confetti: ^0.7.0
  gap: ^3.0.1
  fl_chart: ^0.69.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.4.2
  shared_preferences: ^2.3.2
  connectivity_plus: ^7.0.0

  # OAuth & Sign In
  google_sign_in: ^6.2.1
  open_file: ^3.5.10

  # ====================
  # INTEGRATIONS (PHASE 4)
  # ====================

  # Calendar Integrations
  googleapis: ^11.4.0
  googleapis_auth: ^1.6.0

  # Communication Integrations
  http: ^1.2.2

  # Email Integration
  mailer: ^6.3.0

  # File & PDF
  pdf: ^3.10.7

  # UI & Design
  google_fonts: ^6.1.0
  flutter_staggered_animations: ^1.1.1

  # Database - Supabase
  supabase_flutter: ^2.5.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Linting
  flutter_lints: ^5.0.0

  # Code Generation
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.0
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1

# Flutter configuration
flutter:
  uses-material-design: true

  # Assets - will add later
